$kind: collection
info:
  name: 'FieldBooking API'
  description: |-
    Postman collection generated from the FastAPI implementation in this project.
    Base URL defaults to http://127.0.0.1:8000.
    Includes discovered endpoints plus helpful auth token capture for login.
  version: '1.0.0'
variable:
  - key: 'baseUrl'
    value: 'http://127.0.0.1:8000'
    type: 'string'
  - key: 'accessToken'
    value: ''
    type: 'string'
item:
  - name: 'Root'
    item:
      - name: 'Get Root Message'
        request:
          method: 'GET'
          url:
            raw: '{{baseUrl}}/'
            host:
              - '{{baseUrl}}'
            path: []
  - name: 'Authentication'
    item:
      - name: 'Login'
        event:
          - listen: 'test'
            script:
              exec:
                - 'pm.test("Status code is 200", function () {'
                - '  pm.response.to.have.status(200);'
                - '});'
                - 'const json = pm.response.json();'
                - 'if (json.access_token) {'
                - '  pm.collectionVariables.set("accessToken", json.access_token);'
                - '}'
        request:
          method: 'POST'
          header:
            - key: 'Content-Type'
              value: 'application/x-www-form-urlencoded'
          body:
            mode: 'urlencoded'
            urlencoded:
              - key: 'username'
                value: 'testuser'
                type: 'text'
              - key: 'password'
                value: 'secret123'
                type: 'text'
          url:
            raw: '{{baseUrl}}/login'
            host:
              - '{{baseUrl}}'
            path:
              - 'login'
  - name: 'Users'
    item:
      - name: 'Create User'
        request:
          method: 'POST'
          header:
            - key: 'Content-Type'
              value: 'application/json'
          body:
            mode: 'raw'
            raw: |-
              {
                "username": "testuser",
                "email": "testuser@example.com",
                "password": "secret123"
              }
            options:
              raw:
                language: 'json'
          url:
            raw: '{{baseUrl}}/users/'
            host:
              - '{{baseUrl}}'
            path:
              - 'users'
              - ''
      - name: 'Get User By ID'
        request:
          method: 'GET'
          url:
            raw: '{{baseUrl}}/users/1'
            host:
              - '{{baseUrl}}'
            path:
              - 'users'
              - '1'
  - name: 'Bookings'
    item:
      - name: 'Create Booking'
        request:
          auth:
            type: 'bearer'
            token: '{{accessToken}}'
          method: 'POST'
          header:
            - key: 'Content-Type'
              value: 'application/json'
          body:
            mode: 'raw'
            raw: |-
              {
                "field_name": "Lapangan Futsal A",
                "start_time": "2026-04-20T10:00:00",
                "end_time": "2026-04-20T11:00:00"
              }
            options:
              raw:
                language: 'json'
          url:
            raw: '{{baseUrl}}/bookings/'
            host:
              - '{{baseUrl}}'
            path:
              - 'bookings'
              - ''
      - name: 'List Bookings'
        request:
          method: 'GET'
          url:
            raw: '{{baseUrl}}/bookings/?skip=0&limit=100'
            host:
              - '{{baseUrl}}'
            path:
              - 'bookings'
              - ''
            query:
              - key: 'skip'
                value: '0'
              - key: 'limit'
                value: '100'
      - name: 'Get Booking By ID'
        request:
          method: 'GET'
          url:
            raw: '{{baseUrl}}/bookings/1'
            host:
              - '{{baseUrl}}'
            path:
              - 'bookings'
              - '1'
      - name: 'Update Booking'
        request:
          auth:
            type: 'bearer'
            token: '{{accessToken}}'
          method: 'PUT'
          header:
            - key: 'Content-Type'
              value: 'application/json'
          body:
            mode: 'raw'
            raw: |-
              {
                "field_name": "Lapangan Futsal B",
                "start_time": "2026-04-20T12:00:00",
                "end_time": "2026-04-20T13:00:00"
              }
            options:
              raw:
                language: 'json'
          url:
            raw: '{{baseUrl}}/bookings/1'
            host:
              - '{{baseUrl}}'
            path:
              - 'bookings'
              - '1'
      - name: 'Delete Booking'
        request:
          auth:
            type: 'bearer'
            token: '{{accessToken}}'
          method: 'DELETE'
          url:
            raw: '{{baseUrl}}/bookings/1'
            host:
              - '{{baseUrl}}'
            path:
              - 'bookings'
              - '1'
